jenkins:
  systemMessage: "Full-Spec Items Engine Acceptance Test"
  numExecutors: 0
  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "https://kubernetes.default.svc"
        skipTlsVerify: true
        namespace: "${varroa_controller_namespace}"
        jenkinsUrl: "${varroa_controller_endpoint}"
        webSocket: true
        templates:
          - name: "default"
            namespace: "${varroa_controller_namespace}"
            label: "agent"
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                alwaysPullImage: true
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
